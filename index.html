<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多策略 · 模拟盘收益看板</title>
<style>
  /* 无印良品式浅色主题：暖米白底 + 原木/亚麻低饱和色，固定浅色不随系统切换 */
  :root {
    color-scheme: light;
    --paper:   #F1EEE7;   /* 亚麻米白 */
    --card:    #FAF8F3;   /* 卡片 · 暖白 */
    --ink:     #3B3630;   /* 深胡桃 */
    --ink-2:   #6B6459;   /* 次级 · 灰褐 */
    --muted:   #9C9488;   /* 弱化 · 燕麦 */
    --hairline:#E1DBCF;
    --grid:    #E9E4D9;
    --accent:  #5D7A45;
    --s-main:  #5D7A45;   /* 主策略 · 苔绿 */
    --s-aopen: #4C70A0;   /* A·K线开 · 蓝灰 */
    --s-noyang:#A6612F;   /* 删连阳 · 赤陶 */
    --s-novol: #8A5B7C;   /* 删放量 · 梅紫 */
    --bench:   #ADA495;   /* 基准 · 暖灰 */
    --up:      #55764A;
    --down:    #A65847;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang SC", "Hiragino Sans GB", -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: Georgia, "Songti SC", "STSong", serif; }
  .mono  { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }

  .page { max-width: 1060px; margin: 0 auto; padding: 0 28px 72px; }

  header.top {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 40px 0 8px;
  }
  header.top h1 { font-size: 24px; font-weight: 500; letter-spacing: .06em; }
  header.top .stamp { font-size: 12px; color: var(--muted); letter-spacing: .1em; }
  .subtitle { font-size: 12.5px; color: var(--muted); letter-spacing: .28em; margin-bottom: 34px; }

  /* ---- 策略卡片 ---- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .tile {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 20px 22px 18px;
  }
  .tile .head { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .tile .chip { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .tile .name { font-size: 15px; font-weight: 600; letter-spacing: .08em; }
  .tile .note { font-size: 11.5px; color: var(--muted); margin-left: auto; letter-spacing: .05em; }
  .tile .equity { font-size: 30px; font-weight: 500; letter-spacing: .01em; margin-top: 8px; }
  .tile .equity small { font-size: 14px; color: var(--muted); font-weight: 400; margin-left: 2px; }
  .tile .ret { font-size: 14px; margin-top: 2px; }
  .tile .ret .day { color: var(--muted); font-size: 12px; margin-left: 10px; }
  .tile .split {
    display: flex; gap: 0; margin-top: 16px; padding-top: 12px;
    border-top: 1px solid var(--hairline);
  }
  .tile .split div { flex: 1; }
  .tile .split .k { font-size: 11px; color: var(--muted); letter-spacing: .1em; }
  .tile .split .v { font-size: 13px; margin-top: 1px; }
  .tile .split.metrics { margin-top: 12px; padding-top: 10px; }
  .tile .split.metrics2 { margin-top: 10px; padding-top: 10px; }
  .tile .sample { font-size: 10.5px; color: var(--muted); margin-top: 9px; letter-spacing: .04em; }

  .pos-num { color: var(--up); }
  .neg-num { color: var(--down); }

  /* ---- 卡片通用 ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 24px 26px;
    margin-top: 18px;
  }
  .card h2 {
    font-size: 13px; font-weight: 600; letter-spacing: .3em;
    color: var(--ink-2); margin-bottom: 4px;
  }
  .card .sub { font-size: 11.5px; color: var(--muted); margin-bottom: 16px; }

  /* ---- 图表 ---- */
  .legend { display: flex; gap: 22px; flex-wrap: wrap; margin: 6px 0 14px; }
  .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-2); }
  .legend i { width: 16px; height: 2.5px; border-radius: 2px; display: inline-block; }
  .legend i.dash { background: repeating-linear-gradient(90deg, var(--bench) 0 4px, transparent 4px 7px); height: 2px; }

  .chart-wrap { position: relative; }
  .chart-wrap svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 5px;
    padding: 9px 12px; font-size: 12px; line-height: 1.7;
    box-shadow: 0 4px 18px rgba(0,0,0,.10); min-width: 150px; z-index: 5;
  }
  .tooltip .tt-date { color: var(--muted); font-size: 11px; letter-spacing: .08em; margin-bottom: 3px; }
  .tooltip .row { display: flex; align-items: center; gap: 7px; }
  .tooltip .row i { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .tooltip .row .val { margin-left: auto; padding-left: 14px; }

  /* ---- 表格 ---- */
  .strategy-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; letter-spacing: .1em; margin: 22px 0 8px;
  }
  .strategy-label i { width: 9px; height: 9px; border-radius: 50%; }
  .strategy-label em { font-style: normal; font-weight: 400; font-size: 11.5px; color: var(--muted); }
  .tbl-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th {
    text-align: right; font-weight: 500; color: var(--muted); font-size: 11px;
    letter-spacing: .1em; padding: 7px 10px; border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; padding-left: 2px; }
  td { text-align: right; padding: 7.5px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.code { font-weight: 600; letter-spacing: .04em; }
  .empty { color: var(--muted); font-size: 12.5px; padding: 14px 2px; }

  footer {
    margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--hairline);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 11.5px; color: var(--muted); letter-spacing: .08em;
  }
</style>

<div class="page">
  <header class="top">
    <h1 class="serif">模拟盘 · 多策略收益看板</h1>

    <span>模拟盘数据 · 不构成任何投资建议</span>
  </footer>
</div>

    <div class="sample">样本 ${s.days} 交易日 · ${s.nExits} 笔了结${s.days<20?" · 数据尚少，指标仅供参考":""}</div>`;
  tiles.appendChild(div);
});

/* ---------- 图例 ---------- */
const legend = document.getElementById("legend");
DATA.strategies.forEach(s => {
  legend.insertAdjacentHTML("beforeend",
    `<span><i style="background:${COLORS[s.key]}"></i>${s.name}</span>`);
});
if (DATA.bench.length) legend.insertAdjacentHTML("beforeend", `<span><i class="dash"></i>QQQ 基准</span>`);

/* ---------- 收益率曲线 ---------- */
(function () {
  const svg = document.getElementById("chart");
  const W = 1000, H = 380, padL = 56, padR = 96, padT = 18, padB = 40;
  const dates = DATA.dates;
  if (dates.length < 2) {
    svg.outerHTML = '<p class="empty">交易天数不足两天，曲线将在数据积累后出现。</p>';
    return;
  }
  const series = DATA.strategies.map(s => ({
    key: s.key, name: s.name,
    pts: s.curve.map(v => (v / DATA.initial - 1) * 100)
  }));
  if (DATA.bench.length) series.push({ key: "bench", name: "QQQ", pts: DATA.bench, dash: true });

  const allVals = series.flatMap(s => s.pts).filter(v => v != null);
  let lo = Math.min(...allVals, 0), hi = Math.max(...allVals, 0);
  const span = Math.max(hi - lo, 0.5), padY = span * 0.15;
  lo -= padY; hi += padY;

  const x = i => padL + (W - padL - padR) * i / (dates.length - 1);
  const y = v => padT + (H - padT - padB) * (1 - (v - lo) / (hi - lo));

  let g = "";
  // 横向网格 + y轴刻度
  const ticks = 5;
  for (let t = 0; t <= ticks; t++) {
    const v = lo + (hi - lo) * t / ticks;
    g += `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${padL-8}" y="${y(v)+4}" text-anchor="end" font-size="10.5" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">${v.toFixed(1)}%</text>`;
  }
  // 0% 基线加重
  if (lo < 0 && hi > 0)
    g += `<line x1="${padL}" y1="${y(0)}" x2="${W-padR}" y2="${y(0)}" stroke="var(--hairline)" stroke-width="1.5"/>`;
  // x轴日期（最多 8 个）
  const step = Math.max(1, Math.ceil(dates.length / 8));
  for (let i = 0; i < dates.length; i += step) {
    g += `<text x="${x(i)}" y="${H-14}" text-anchor="middle" font-size="10.5" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">${dates[i].slice(5)}</text>`;
  }
  // 曲线
  series.forEach(s => {
    const d = s.pts.map((v, i) => v == null ? "" : `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join("");
    const color = s.key === "bench" ? "var(--bench)" : COLORS[s.key];
    g += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${s.dash?1.6:2.2}" ${s.dash?'stroke-dasharray="5 4"':''} stroke-linejoin="round" stroke-linecap="round"/>`;
    // 线尾直接标注
    const last = s.pts.length - 1, lv = s.pts[last];
    if (lv != null) {
      g += `<circle cx="${x(last)}" cy="${y(lv)}" r="3" fill="${color}"/>`;
      g += `<text x="${x(last)+8}" y="${y(lv)+4}" font-size="11" fill="${color}" font-weight="600" font-family="ui-monospace,Menlo,monospace">${s.name} ${lv>0?"+":""}${lv.toFixed(2)}%</text>`;
    }
  });
  // 悬浮层
  g += `<line id="xhair" x1="0" y1="${padT}" x2="0" y2="${H-padB}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3" visibility="hidden"/>`;
  g += `<rect x="${padL}" y="${padT}" width="${W-padL-padR}" height="${H-padT-padB}" fill="transparent" id="hover-zone"/>`;
  svg.innerHTML = g;

  const wrap = document.getElementById("chart-wrap"), tip = document.getElementById("tooltip");
  const zone = document.getElementById("hover-zone"), xhair = document.getElementById("xhair");
  zone.addEventListener("mousemove", ev => {
    const rect = svg.getBoundingClientRect();
    const sx = (ev.clientX - rect.left) / rect.width * W;
    const i = Math.max(0, Math.min(dates.length - 1,
      Math.round((sx - padL) / (W - padL - padR) * (dates.length - 1))));
    xhair.setAttribute("x1", x(i)); xhair.setAttribute("x2", x(i));
    xhair.setAttribute("visibility", "visible");
    let rows = series.map(s => {
      const v = s.pts[i]; if (v == null) return "";
      const color = s.key === "bench" ? "var(--bench)" : COLORS[s.key];
      return `<div class="row"><i style="background:${color}"></i>${s.name}<span class="val mono ${cls(v)}">${v>0?"+":""}${v.toFixed(2)}%</span></div>`;
    }).join("");
    tip.innerHTML = `<div class="tt-date mono">${dates[i]}</div>` + rows;
    tip.style.display = "block";
    const wrapRect = wrap.getBoundingClientRect();
    let tx = (x(i) / W) * wrapRect.width + 14;
    if (tx + 170 > wrapRect.width) tx -= 190;
    tip.style.left = tx + "px";
    tip.style.top = "20px";
  });
  zone.addEventListener("mouseleave", () => {
    tip.style.display = "none"; xhair.setAttribute("visibility", "hidden");
  });
})();

/* ---------- 持仓明细 ---------- */
const posBox = document.getElementById("positions");

      <td class="mono">${p.px ? fmtUsd(p.px) : "—"}</td>
      <td class="mono">${fmtUsd(p.mv)}</td>
      <td class="mono ${cls(p.upnl)}">${p.upnl>0?"+":""}${fmtUsd(p.upnl)}</td>
      <td class="mono ${cls(p.upnlPct)}">${fmtPct(p.upnlPct)}</td>
      <td class="mono">${fmtUsd(p.stop)}</td>

  posBox.insertAdjacentHTML("beforeend", `
    <div class="tbl-wrap"><table>

      <th>浮动盈亏</th><th>盈亏%</th><th>止损价</th><th>距止损</th><th>持仓</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`);
});

      <td class="mono">${t.qty}</td>
      <td class="mono">${fmtUsd(t.price)}</td>
      <td class="mono ${cls(t.pnl)}">${t.pnl>0?"+":""}${fmtUsd(t.pnl)}</td>
      <td style="text-align:left;color:var(--muted)">${t.note}</td>
    </tr>`).join("");
  trdBox.insertAdjacentHTML("beforeend", `
    <div class="tbl-wrap"><table>
      <thead><tr><th>日期</th><th>代码</th><th>动作</th><th>股数</th><th>价格</th><th>净盈亏</th><th>说明</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`);
});
</script>
