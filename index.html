<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Trading · Multi-Strategy Dashboard</title>
<style>
  /* 无印良品式浅色主题：暖米白底 + 原木/亚麻低饱和色，固定浅色不随系统切换 */
  :root {
    color-scheme: light;
    --paper:   #F1EEE7;   /* 亚麻米白 */
    --card:    #FAF8F3;   /* 卡片 · 暖白 */
    --ink:     #3B3630;   /* 深胡桃 */
    --ink-2:   #6B6459;   /* 次级 · 灰褐 */
    --muted:   #9C9488;   /* 弱化 · 燕麦 */
    --hairline:#E1DBCF;
    --grid:    #E9E4D9;
    --accent:  #5D7A45;
    --s-main:  #5D7A45;   /* 主策略 · 苔绿 */
    --s-aopen: #4C70A0;   /* A·K线开 · 蓝灰 */
    --s-noyang:#A6612F;   /* 删连阳 · 赤陶 */
    --s-novol: #8A5B7C;   /* 删放量 · 梅紫 */
    --s-minervini:#2F7A6F;/* Minervini · 窑变青 */
    --s-techfund:#8A6D3B; /* 科技+基本面 · 秋香棕 */
    --bench:   #ADA495;   /* 基准 · 暖灰 */
    --up:      #55764A;
    --down:    #A65847;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang SC", "Hiragino Sans GB", -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  /* 标题字体：拉丁文用 Georgia 衬线，中日文回退到手机上都有的清晰黑体（PingFang/Hiragino/YaHei），
     避免手机缺少中文衬线字体时回退成难看字体或合成假粗体导致「字体崩」 */
  .serif { font-family: Georgia, "Times New Roman", "PingFang SC", "Hiragino Sans", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .mono  { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }

  .page { max-width: 1060px; margin: 0 auto; padding: 0 28px 72px; }

  header.top {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 40px 0 8px;
  }
  header.top h1 { font-size: 24px; font-weight: 500; letter-spacing: .06em; }
  header.top .stamp { font-size: 12px; color: var(--muted); letter-spacing: .1em; }
  .subtitle { font-size: 12.5px; color: var(--muted); letter-spacing: .28em; margin-bottom: 34px; }

  /* ---- 策略卡片 ---- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .tile {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 20px 22px 18px;
  }
  .tile .head { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .tile .chip { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .tile .name { font-size: 15px; font-weight: 600; letter-spacing: .08em; }
  .tile .note { font-size: 11.5px; color: var(--muted); margin-left: auto; letter-spacing: .05em; }
  .tile .equity { font-size: 30px; font-weight: 500; letter-spacing: .01em; margin-top: 8px; }
  .tile .equity small { font-size: 14px; color: var(--muted); font-weight: 400; margin-left: 2px; }
  .tile .ret { font-size: 14px; margin-top: 2px; }
  .tile .ret .day { color: var(--muted); font-size: 12px; margin-left: 10px; }
  .tile .split {
    display: flex; gap: 0; margin-top: 16px; padding-top: 12px;
    border-top: 1px solid var(--hairline);
  }
  .tile .split div { flex: 1; }
  .tile .split .k { font-size: 11px; color: var(--muted); letter-spacing: .1em; }
  .tile .split .v { font-size: 13px; margin-top: 1px; }
  .tile .split.metrics { margin-top: 12px; padding-top: 10px; }
  .tile .split.metrics2 { margin-top: 10px; padding-top: 10px; }
  .tile .sample { font-size: 10.5px; color: var(--muted); margin-top: 9px; letter-spacing: .04em; }

  .pos-num { color: var(--up); }
  .neg-num { color: var(--down); }

  /* ---- 卡片通用 ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 24px 26px;
    margin-top: 18px;
  }
  .card h2 {
    font-size: 13px; font-weight: 600; letter-spacing: .3em;
    color: var(--ink-2); margin-bottom: 4px;
  }
  .card .sub { font-size: 11.5px; color: var(--muted); margin-bottom: 16px; }

  /* ---- 图表 ---- */
  .legend { display: flex; gap: 22px; flex-wrap: wrap; margin: 6px 0 14px; }
  .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-2); }
  .legend i { width: 16px; height: 2.5px; border-radius: 2px; display: inline-block; }
  .legend i.dash { background: repeating-linear-gradient(90deg, var(--bench) 0 4px, transparent 4px 7px); height: 2px; }

  .chart-wrap { position: relative; }
  .chart-wrap svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 5px;
    padding: 9px 12px; font-size: 12px; line-height: 1.7;
    box-shadow: 0 4px 18px rgba(0,0,0,.10); min-width: 150px; z-index: 5;
  }
  .tooltip .tt-date { color: var(--muted); font-size: 11px; letter-spacing: .08em; margin-bottom: 3px; }
  .tooltip .row { display: flex; align-items: center; gap: 7px; }
  .tooltip .row i { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .tooltip .row .val { margin-left: auto; padding-left: 14px; }

  /* ---- 表格 ---- */
  .strategy-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; letter-spacing: .1em; margin: 22px 0 8px;
  }
  .strategy-label i { width: 9px; height: 9px; border-radius: 50%; }
  .strategy-label em { font-style: normal; font-weight: 400; font-size: 11.5px; color: var(--muted); }
  .tbl-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th {
    text-align: right; font-weight: 500; color: var(--muted); font-size: 11px;
    letter-spacing: .1em; padding: 7px 10px; border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; padding-left: 2px; }
  td { text-align: right; padding: 7.5px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.code { font-weight: 600; letter-spacing: .04em; }
  .empty { color: var(--muted); font-size: 12.5px; padding: 14px 2px; }

  /* ---- 每日盈亏日历 ---- */
  .cal-switch { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 16px; }
  .cal-switch button {
    border: 1px solid var(--hairline); background: transparent; color: var(--ink-2);
    font-size: 11.5px; padding: 5px 11px; border-radius: 5px; cursor: pointer;
    font-family: inherit; letter-spacing: .05em; display: inline-flex; align-items: center; gap: 6px;
  }
  .cal-switch button i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .cal-switch button.active { background: var(--paper); border-color: var(--ink-2); color: var(--ink); font-weight: 600; }
  .cal-months { display: flex; flex-wrap: wrap; gap: 22px; }
  .cal-month { flex: 0 0 auto; }
  .cal-title { font-size: 11.5px; color: var(--ink-2); letter-spacing: .12em; margin-bottom: 7px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 66px); gap: 3px; }
  .cal-grid .wd { font-size: 9.5px; color: var(--muted); text-align: center; padding-bottom: 2px; }
  .cal-cell {
    width: 66px; height: 50px; border-radius: 3px; background: var(--grid);
    display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start;
    padding: 3px 4px; box-sizing: border-box; overflow: hidden; cursor: default;
  }
  .cal-cell.empty { background: transparent; }
  .cal-cell .d { font-size: 9px; color: var(--muted); line-height: 1.15; }
  .cal-cell .v { font-size: 11px; font-weight: 600; line-height: 1.3; letter-spacing: -.02em; }
  .cal-cell .p { font-size: 9.5px; line-height: 1.15; opacity: .92; }
  .cal-cell.has { color: #fff; }
  .cal-cell.has .d { color: rgba(255,255,255,.72); }

  /* 手机端：格子缩小，避免横向溢出 */
  @media (max-width: 560px) {
    .cal-grid { grid-template-columns: repeat(7, 44px); gap: 2px; }
    .cal-cell { width: 44px; height: 42px; padding: 2px 3px; }
    .cal-cell .d { font-size: 8px; }
    .cal-cell .v { font-size: 9px; }
    .cal-cell .p { font-size: 8px; }
    .cal-months { gap: 14px; }
  }
  .cal-legend { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); margin-top: 14px; }
  .cal-legend i { width: 15px; height: 13px; border-radius: 2px; display: inline-block; }
  .cal-sum { font-size: 12px; color: var(--ink-2); margin-top: 10px; }
  .cal-sum b { color: var(--ink); }

  footer {
    margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--hairline);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 11.5px; color: var(--muted); letter-spacing: .08em;
  }

  /* ---- 语言切换 ---- */
  .top-right { display: flex; align-items: center; gap: 14px; }
  .langsw { display: inline-flex; border: 1px solid var(--hairline); border-radius: 5px; overflow: hidden; }
  .langsw button {
    border: none; background: transparent; color: var(--muted);
    font-size: 11px; padding: 4px 9px; cursor: pointer; letter-spacing: .04em;
    font-family: inherit; border-left: 1px solid var(--hairline);
  }
  .langsw button:first-child { border-left: none; }
  .langsw button.active { background: var(--accent); color: #fff; }

  /* ---- 手机端适配 ---- */
  @media (max-width: 560px) {
    .page { padding: 0 16px 48px; }
    header.top { flex-direction: column; align-items: stretch; gap: 12px; padding: 26px 0 6px; }
    header.top h1 { font-size: 19px; line-height: 1.35; }
    .top-right { justify-content: space-between; }
    .subtitle { letter-spacing: .16em; margin-bottom: 26px; }
    .langsw button { padding: 6px 13px; font-size: 12px; }
    .card { padding: 20px 16px; }
    .tile { padding: 18px 16px 16px; }
    .tile .equity { font-size: 27px; }
  }
</style>

  </footer>
</div>

function translateNote(str) {
  const map = T().noteMap;
  if (!map || !str) return str;
  let r = str;
  for (const [a, b] of map) r = r.split(a).join(b);

}

/* ---------- 收益率曲线 ---------- */
function drawChart() {
  const svgOld = document.getElementById("chart");
  const dates = DATA.dates;
  const wrap = document.getElementById("chart-wrap");
  // 数据不足两天：提示
  if (dates.length < 2) {
    wrap.innerHTML = `<p class="empty">${T().notEnough}</p>`;
    return;
  }
  wrap.innerHTML = '<svg id="chart" viewBox="0 0 1000 380" role="img"></svg><div class="tooltip" id="tooltip"></div>';
  const svg = document.getElementById("chart");
  const W = 1000, H = 380, padL = 56, padR = 96, padT = 18, padB = 40;
  const series = DATA.strategies.map(s => ({
    key: s.key, name: sName(s),
    pts: s.curve.map(v => (v / DATA.initial - 1) * 100)
  }));
  if (DATA.bench.length) series.push({ key: "bench", name: "QQQ", pts: DATA.bench, dash: true });

  const allVals = series.flatMap(s => s.pts).filter(v => v != null);
  let lo = Math.min(...allVals, 0), hi = Math.max(...allVals, 0);
  const span = Math.max(hi - lo, 0.5), padY = span * 0.15;
  lo -= padY; hi += padY;

  const x = i => padL + (W - padL - padR) * i / (dates.length - 1);
  const y = v => padT + (H - padT - padB) * (1 - (v - lo) / (hi - lo));

  let g = "";
  const ticks = 5;
  for (let k = 0; k <= ticks; k++) {
    const v = lo + (hi - lo) * k / ticks;
    g += `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${padL-8}" y="${y(v)+4}" text-anchor="end" font-size="10.5" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">${v.toFixed(1)}%</text>`;
  }
  if (lo < 0 && hi > 0)
    g += `<line x1="${padL}" y1="${y(0)}" x2="${W-padR}" y2="${y(0)}" stroke="var(--hairline)" stroke-width="1.5"/>`;
  const step = Math.max(1, Math.ceil(dates.length / 8));
  for (let i = 0; i < dates.length; i += step) {
    g += `<text x="${x(i)}" y="${H-14}" text-anchor="middle" font-size="10.5" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">${dates[i].slice(5)}</text>`;
  }
  series.forEach(s => {
    const d = s.pts.map((v, i) => v == null ? "" : `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join("");
    const color = s.key === "bench" ? "var(--bench)" : COLORS[s.key];
    g += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${s.dash?1.6:2.2}" ${s.dash?'stroke-dasharray="5 4"':''} stroke-linejoin="round" stroke-linecap="round"/>`;
    const last = s.pts.length - 1, lv = s.pts[last];
    if (lv != null) {
      g += `<circle cx="${x(last)}" cy="${y(lv)}" r="3" fill="${color}"/>`;
      g += `<text x="${x(last)+8}" y="${y(lv)+4}" font-size="11" fill="${color}" font-weight="600" font-family="ui-monospace,Menlo,monospace">${s.name} ${lv>0?"+":""}${lv.toFixed(2)}%</text>`;
    }
  });
  g += `<line id="xhair" x1="0" y1="${padT}" x2="0" y2="${H-padB}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3" visibility="hidden"/>`;
  g += `<rect x="${padL}" y="${padT}" width="${W-padL-padR}" height="${H-padT-padB}" fill="transparent" id="hover-zone"/>`;
  svg.innerHTML = g;

  const tip = document.getElementById("tooltip");
  const zone = document.getElementById("hover-zone"), xhair = document.getElementById("xhair");
  zone.addEventListener("mousemove", ev => {
    const rect = svg.getBoundingClientRect();
    const sx = (ev.clientX - rect.left) / rect.width * W;
    const i = Math.max(0, Math.min(dates.length - 1,
      Math.round((sx - padL) / (W - padL - padR) * (dates.length - 1))));
    xhair.setAttribute("x1", x(i)); xhair.setAttribute("x2", x(i));
    xhair.setAttribute("visibility", "visible");
    let rows = series.map(s => {
      const v = s.pts[i]; if (v == null) return "";
      const color = s.key === "bench" ? "var(--bench)" : COLORS[s.key];
      return `<div class="row"><i style="background:${color}"></i>${s.name}<span class="val mono ${cls(v)}">${v>0?"+":""}${v.toFixed(2)}%</span></div>`;
    }).join("");
    tip.innerHTML = `<div class="tt-date mono">${dates[i]}</div>` + rows;
    tip.style.display = "block";
    const wrapRect = wrap.getBoundingClientRect();
    let tx = (x(i) / W) * wrapRect.width + 14;
    if (tx + 170 > wrapRect.width) tx -= 190;
    tip.style.left = tx + "px";
    tip.style.top = "20px";
  });
  zone.addEventListener("mouseleave", () => {
    tip.style.display = "none"; xhair.setAttribute("visibility", "hidden");
  });
}

/* ---------- 每日盈亏日历 ---------- */
let calKey = null;
function renderCalendar() {
  const t = T();
  if (!calKey || !DATA.strategies.some(s => s.key === calKey))
    calKey = DATA.strategies.length ? DATA.strategies[0].key : null;

  /* 策略切换按钮 */
  const sw = document.getElementById("cal-switch"); sw.innerHTML = "";
  DATA.strategies.forEach(s => {
    const b = document.createElement("button");
    b.className = (s.key === calKey) ? "active" : "";
    b.innerHTML = `<i style="background:${COLORS[s.key]}"></i>${sName(s)}`;
    b.addEventListener("click", () => { calKey = s.key; renderCalendar(); });
    sw.appendChild(b);
  });

  const box = document.getElementById("cal-months");
  const sumEl = document.getElementById("cal-sum");
  const legEl = document.getElementById("cal-legend");
  const s = DATA.strategies.find(x => x.key === calKey);
  if (!s) { box.innerHTML = ""; return; }

  /* 每日盈亏 = 当日权益 − 前一日权益（权益曲线已含浮动盈亏） */
  const dates = DATA.dates, eq = s.curve, pnl = {};
  for (let i = 1; i < dates.length; i++) {
    if (eq[i] != null && eq[i-1] != null && eq[i-1] !== 0)
      pnl[dates[i]] = { v: eq[i] - eq[i-1], p: (eq[i] / eq[i-1] - 1) * 100 };
  }
  const vals = Object.values(pnl).map(o => o.v).filter(v => Math.abs(v) > 0.005);
  if (!vals.length) {
    box.innerHTML = `<p class="empty">${t.calNone}</p>`;
    sumEl.textContent = ""; legEl.innerHTML = ""; return;
  }
  const maxAbs = Math.max(...vals.map(Math.abs));

  /* 按月分组渲染 */
  const months = {};
  Object.keys(pnl).forEach(d => { const m = d.slice(0, 7); (months[m] = months[m] || []).push(d); });
  box.innerHTML = "";
  Object.keys(months).sort().forEach(m => {
    const y = +m.slice(0, 4), mo = +m.slice(5, 7);
    const firstDow = new Date(y, mo - 1, 1).getDay();
    const nDays = new Date(y, mo, 0).getDate();
    let html = `<div class="cal-month"><div class="cal-title">${m}</div><div class="cal-grid">`;
    t.wd.forEach(w => html += `<div class="wd">${w}</div>`);
    for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= nDays; d++) {
      const ds = `${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const o = pnl[ds];
      if (!o || Math.abs(o.v) <= 0.005) {
        html += `<div class="cal-cell"><span class="d">${d}</span></div>`; continue;
      }
      const a = Math.min(1, 0.25 + Math.abs(o.v) / maxAbs * 0.75);   // 颜色深浅=盈亏幅度
      const bg = o.v > 0 ? `rgba(85,118,74,${a})` : `rgba(166,88,71,${a})`;
      const sg = o.v > 0 ? "+" : "";
      /* 金额过千去掉小数，避免撑破格子 */
      const amt = Math.abs(o.v) >= 1000 ? o.v.toFixed(0) : o.v.toFixed(2);
      const tip = `${ds}\n${sg}${o.v.toFixed(2)} USD (${o.p > 0 ? "+" : ""}${o.p.toFixed(2)}%)`;
      html += `<div class="cal-cell has" style="background:${bg}" title="${tip}">`
            + `<span class="d">${d}</span>`
            + `<span class="v">${sg}${amt}</span>`
            + `<span class="p">${o.p > 0 ? "+" : ""}${o.p.toFixed(2)}%</span></div>`;
    }
    box.insertAdjacentHTML("beforeend", html + `</div></div>`);
  });

  const wins = vals.filter(v => v > 0), loss = vals.filter(v => v < 0);
  /* 带符号金额：全亏时 best 也是负数，不能由文案硬拼 "+$"，否则出现 "+$-18.00" */
  const fmtSigned = v => (v >= 0 ? "+$" : "-$") + fmtUsd(Math.abs(v));
  sumEl.innerHTML = t.calSum(vals.length, wins.length, loss.length,
                             fmtSigned(Math.max(...vals)), fmtSigned(Math.min(...vals)));
  legEl.innerHTML =
    `<i style="background:rgba(166,88,71,.9)"></i>${t.calLoss}` +
    `<i style="background:var(--grid);margin-left:12px"></i>${t.calFlat}` +
    `<i style="background:rgba(85,118,74,.9);margin-left:12px"></i>${t.calProfit}`;
}

/* ---------- 渲染全部 + 语言切换 ---------- */
function renderAll() {
  applyStatic();
  renderTiles();
  renderLegend();
  drawChart();
  renderCalendar();
  renderPositions();
  renderTrades();
}
document.querySelectorAll("#langsw button").forEach(b => {
  b.addEventListener("click", () => {
    lang = b.dataset.lang;
    localStorage.setItem("dashLang", lang);
    renderAll();
  });
});
renderAll();
</script>
</html>
