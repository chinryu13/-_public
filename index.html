<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Trading · Multi-Strategy Dashboard</title>
<style>
  /* 无印良品式浅色主题：暖米白底 + 原木/亚麻低饱和色，固定浅色不随系统切换 */
  :root {
    color-scheme: light;
    --paper:   #F1EEE7;   /* 亚麻米白 */
    --card:    #FAF8F3;   /* 卡片 · 暖白 */
    --ink:     #3B3630;   /* 深胡桃 */
    --ink-2:   #6B6459;   /* 次级 · 灰褐 */
    --muted:   #9C9488;   /* 弱化 · 燕麦 */
    --hairline:#E1DBCF;
    --grid:    #E9E4D9;
    --accent:  #5D7A45;
    --s-main:  #5D7A45;   /* 主策略 · 苔绿 */
    --s-aopen: #4C70A0;   /* A·K线开 · 蓝灰 */
    --s-noyang:#A6612F;   /* 删连阳 · 赤陶 */
    --s-novol: #8A5B7C;   /* 删放量 · 梅紫 */
    --bench:   #ADA495;   /* 基准 · 暖灰 */
    --up:      #55764A;
    --down:    #A65847;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "PingFang SC", "Hiragino Sans GB", -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: Georgia, "Songti SC", "STSong", serif; }
  .mono  { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }

  .page { max-width: 1060px; margin: 0 auto; padding: 0 28px 72px; }

  header.top {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 40px 0 8px;
  }
  header.top h1 { font-size: 24px; font-weight: 500; letter-spacing: .06em; }
  header.top .stamp { font-size: 12px; color: var(--muted); letter-spacing: .1em; }
  .subtitle { font-size: 12.5px; color: var(--muted); letter-spacing: .28em; margin-bottom: 34px; }

  /* ---- 策略卡片 ---- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .tile {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 20px 22px 18px;
  }
  .tile .head { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .tile .chip { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .tile .name { font-size: 15px; font-weight: 600; letter-spacing: .08em; }
  .tile .note { font-size: 11.5px; color: var(--muted); margin-left: auto; letter-spacing: .05em; }
  .tile .equity { font-size: 30px; font-weight: 500; letter-spacing: .01em; margin-top: 8px; }
  .tile .equity small { font-size: 14px; color: var(--muted); font-weight: 400; margin-left: 2px; }
  .tile .ret { font-size: 14px; margin-top: 2px; }
  .tile .ret .day { color: var(--muted); font-size: 12px; margin-left: 10px; }
  .tile .split {
    display: flex; gap: 0; margin-top: 16px; padding-top: 12px;
    border-top: 1px solid var(--hairline);
  }
  .tile .split div { flex: 1; }
  .tile .split .k { font-size: 11px; color: var(--muted); letter-spacing: .1em; }
  .tile .split .v { font-size: 13px; margin-top: 1px; }
  .tile .split.metrics { margin-top: 12px; padding-top: 10px; }
  .tile .split.metrics2 { margin-top: 10px; padding-top: 10px; }
  .tile .sample { font-size: 10.5px; color: var(--muted); margin-top: 9px; letter-spacing: .04em; }

  .pos-num { color: var(--up); }
  .neg-num { color: var(--down); }

  /* ---- 卡片通用 ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 24px 26px;
    margin-top: 18px;
  }
  .card h2 {
    font-size: 13px; font-weight: 600; letter-spacing: .3em;
    color: var(--ink-2); margin-bottom: 4px;
  }
  .card .sub { font-size: 11.5px; color: var(--muted); margin-bottom: 16px; }

  /* ---- 图表 ---- */
  .legend { display: flex; gap: 22px; flex-wrap: wrap; margin: 6px 0 14px; }
  .legend span { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-2); }
  .legend i { width: 16px; height: 2.5px; border-radius: 2px; display: inline-block; }
  .legend i.dash { background: repeating-linear-gradient(90deg, var(--bench) 0 4px, transparent 4px 7px); height: 2px; }

  .chart-wrap { position: relative; }
  .chart-wrap svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--card); border: 1px solid var(--hairline); border-radius: 5px;
    padding: 9px 12px; font-size: 12px; line-height: 1.7;
    box-shadow: 0 4px 18px rgba(0,0,0,.10); min-width: 150px; z-index: 5;
  }
  .tooltip .tt-date { color: var(--muted); font-size: 11px; letter-spacing: .08em; margin-bottom: 3px; }
  .tooltip .row { display: flex; align-items: center; gap: 7px; }
  .tooltip .row i { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .tooltip .row .val { margin-left: auto; padding-left: 14px; }

  /* ---- 表格 ---- */
  .strategy-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; letter-spacing: .1em; margin: 22px 0 8px;
  }
  .strategy-label i { width: 9px; height: 9px; border-radius: 50%; }
  .strategy-label em { font-style: normal; font-weight: 400; font-size: 11.5px; color: var(--muted); }
  .tbl-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th {
    text-align: right; font-weight: 500; color: var(--muted); font-size: 11px;
    letter-spacing: .1em; padding: 7px 10px; border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; padding-left: 2px; }
  td { text-align: right; padding: 7.5px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.code { font-weight: 600; letter-spacing: .04em; }
  .empty { color: var(--muted); font-size: 12.5px; padding: 14px 2px; }

  footer {
    margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--hairline);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 11.5px; color: var(--muted); letter-spacing: .08em;
  }

  /* ---- 语言切换 ---- */
  .top-right { display: flex; align-items: center; gap: 14px; }
  .langsw { display: inline-flex; border: 1px solid var(--hairline); border-radius: 5px; overflow: hidden; }
  .langsw button {
    border: none; background: transparent; color: var(--muted);
    font-size: 11px; padding: 4px 9px; cursor: pointer; letter-spacing: .04em;
    font-family: inherit; border-left: 1px solid var(--hairline);
  }
  .langsw button:first-child { border-left: none; }
  .langsw button.active { background: var(--accent); color: #fff; }
</style>

<div class="page">
  <header class="top">
    <h1 class="serif" id="h1"></h1>
    <div class="top-right">
      <span class="stamp mono" id="stamp"></span>
      <div class="langsw" id="langsw">
        <button data-lang="en">EN</button>
        <button data-lang="ja">日本語</button>
        <button data-lang="zh">中文</button>
      </div>
    </div>
  </header>
  <p class="subtitle">PAPER TRADING · DAILY EQUITY</p>

  <div class="tiles" id="tiles"></div>

  <div class="card">
    <h2 id="chart-h2"></h2>
    <p class="sub" id="chart-sub"></p>
    <div class="legend" id="legend"></div>
    <div class="chart-wrap" id="chart-wrap">
      <svg id="chart" viewBox="0 0 1000 380" role="img"></svg>
      <div class="tooltip" id="tooltip"></div>

  </div>

  <div class="card">
    <h2 id="pos-h2"></h2>
    <p class="sub" id="pos-sub"></p>
    <div id="positions"></div>
  </div>

  <div class="card">
    <h2 id="trd-h2"></h2>
    <p class="sub" id="trd-sub"></p>
    <div id="trades"></div>
  </div>

  <footer>
    <span id="foot-l"></span>
    <span id="foot-r"></span>
  </footer>
</div>

let lang = localStorage.getItem("dashLang") || "en";
if (!I18N[lang]) lang = "en";
const T = () => I18N[lang];
const sName = s => (T().sName[s.key] || s.name);
function translateNote(str) {
  const map = T().noteMap;
  if (!map || !str) return str;
  let r = str;
  for (const [a, b] of map) r = r.split(a).join(b);
  return r;
}

const fmtUsd = v => v == null ? "—" : v.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtPct = v => v == null ? "—" : (v > 0 ? "+" : "") + v.toFixed(2) + "%";
const cls = v => v > 0 ? "pos-num" : (v < 0 ? "neg-num" : "");

/* ---------- 静态文字 ---------- */
function applyStatic() {
  const t = T();
  document.title = t.title;
  document.getElementById("h1").textContent = t.title;
  document.getElementById("stamp").textContent = t.updated + " " + DATA.generated;
  document.getElementById("chart-h2").textContent = t.chartH;
  document.getElementById("chart-sub").textContent = t.chartSub(DATA.initial, DATA.priced);
  document.getElementById("pos-h2").textContent = t.posH;
  document.getElementById("pos-sub").textContent = t.posSub;
  document.getElementById("trd-h2").textContent = t.trdH;
  document.getElementById("trd-sub").textContent = t.trdSub;
  document.getElementById("foot-l").textContent = t.footL;
  document.getElementById("foot-r").textContent = t.footR;
  document.querySelectorAll("#langsw button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang));
}

/* ---------- 策略卡片 ---------- */
function renderTiles() {
  const t = T();
  const box = document.getElementById("tiles"); box.innerHTML = "";
  DATA.strategies.forEach(s => {
    const div = document.createElement("div");
    div.className = "tile";
    div.innerHTML = `
      <div class="head">
        <span class="chip" style="background:${COLORS[s.key]}"></span>
        <span class="name">${sName(s)}</span>
        <span class="note">${t.sNote[s.key] || s.note}</span>
      </div>
      <div class="equity mono">$${fmtUsd(s.equity)}<small>USD</small></div>
      <div class="ret mono ${cls(s.ret)}">${fmtPct(s.ret)}
        ${s.dayChg != null ? `<span class="day">${t.today} ${fmtPct(s.dayChg)}</span>` : ""}
      </div>
      <div class="split">
        <div><div class="k">${t.cash}</div><div class="v mono">$${fmtUsd(s.cash)}</div></div>
        <div><div class="k">${t.posVal}</div><div class="v mono">$${fmtUsd(s.mv)}</div></div>
        <div><div class="k">${t.upnl}</div><div class="v mono ${cls(s.upnl)}">${s.upnl>0?"+":""}${fmtUsd(s.upnl)}</div></div>
      </div>
      <div class="split metrics">
        <div><div class="k">${t.sharpe}</div><div class="v mono">${s.sharpe==null?"—":s.sharpe.toFixed(2)}</div></div>
        <div><div class="k">${t.sortino}</div><div class="v mono">${s.sortino==null?"—":s.sortino.toFixed(2)}</div></div>
        <div><div class="k">${t.calmar}</div><div class="v mono">${s.calmar==null?"—":s.calmar.toFixed(2)}</div></div>
      </div>
      <div class="split metrics2">
        <div><div class="k">${t.maxdd}</div><div class="v mono ${s.maxDD>0?"neg-num":""}">${s.maxDD>0?"-"+s.maxDD.toFixed(1)+"%":"0%"}</div></div>
        <div><div class="k">${t.winrate}</div><div class="v mono">${s.winRate==null?"—":s.winRate.toFixed(0)+"%"}</div></div>
        <div><div class="k">${t.pf}</div><div class="v mono">${s.profitFactor==null?"—":s.profitFactor.toFixed(2)}</div></div>
      </div>
      <div class="sample">${t.sample(s.days, s.nExits)}</div>`;
    box.appendChild(div);
  });
}

/* ---------- 图例 ---------- */
function renderLegend() {
  const legend = document.getElementById("legend"); legend.innerHTML = "";
  DATA.strategies.forEach(s => {
    legend.insertAdjacentHTML("beforeend",
      `<span><i style="background:${COLORS[s.key]}"></i>${sName(s)}</span>`);
  });
  if (DATA.bench.length) legend.insertAdjacentHTML("beforeend", `<span><i class="dash"></i>${T().bench}</span>`);
}

/* ---------- 收益率曲线 ---------- */
function drawChart() {
  const svgOld = document.getElementById("chart");
  const dates = DATA.dates;
  const wrap = document.getElementById("chart-wrap");
  // 数据不足两天：提示
  if (dates.length < 2) {
    wrap.innerHTML = `<p class="empty">${T().notEnough}</p>`;
    return;
  }
  wrap.innerHTML = '<svg id="chart" viewBox="0 0 1000 380" role="img"></svg><div class="tooltip" id="tooltip"></div>';
  const svg = document.getElementById("chart");
  const W = 1000, H = 380, padL = 56, padR = 96, padT = 18, padB = 40;
  const series = DATA.strategies.map(s => ({
    key: s.key, name: sName(s),
    pts: s.curve.map(v => (v / DATA.initial - 1) * 100)
  }));
  if (DATA.bench.length) series.push({ key: "bench", name: "QQQ", pts: DATA.bench, dash: true });

  const allVals = series.flatMap(s => s.pts).filter(v => v != null);
  let lo = Math.min(...allVals, 0), hi = Math.max(...allVals, 0);
  const span = Math.max(hi - lo, 0.5), padY = span * 0.15;
  lo -= padY; hi += padY;

  const x = i => padL + (W - padL - padR) * i / (dates.length - 1);
  const y = v => padT + (H - padT - padB) * (1 - (v - lo) / (hi - lo));

  let g = "";
  const ticks = 5;
  for (let k = 0; k <= ticks; k++) {
    const v = lo + (hi - lo) * k / ticks;
    g += `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${padL-8}" y="${y(v)+4}" text-anchor="end" font-size="10.5" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">${v.toFixed(1)}%</text>`;
  }
  if (lo < 0 && hi > 0)
    g += `<line x1="${padL}" y1="${y(0)}" x2="${W-padR}" y2="${y(0)}" stroke="var(--hairline)" stroke-width="1.5"/>`;
  const step = Math.max(1, Math.ceil(dates.length / 8));
  for (let i = 0; i < dates.length; i += step) {
    g += `<text x="${x(i)}" y="${H-14}" text-anchor="middle" font-size="10.5" fill="var(--muted)" font-family="ui-monospace,Menlo,monospace">${dates[i].slice(5)}</text>`;
  }
  series.forEach(s => {
    const d = s.pts.map((v, i) => v == null ? "" : `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join("");
    const color = s.key === "bench" ? "var(--bench)" : COLORS[s.key];
    g += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${s.dash?1.6:2.2}" ${s.dash?'stroke-dasharray="5 4"':''} stroke-linejoin="round" stroke-linecap="round"/>`;
    const last = s.pts.length - 1, lv = s.pts[last];
    if (lv != null) {
      g += `<circle cx="${x(last)}" cy="${y(lv)}" r="3" fill="${color}"/>`;
      g += `<text x="${x(last)+8}" y="${y(lv)+4}" font-size="11" fill="${color}" font-weight="600" font-family="ui-monospace,Menlo,monospace">${s.name} ${lv>0?"+":""}${lv.toFixed(2)}%</text>`;
    }
  });
  g += `<line id="xhair" x1="0" y1="${padT}" x2="0" y2="${H-padB}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3" visibility="hidden"/>`;
  g += `<rect x="${padL}" y="${padT}" width="${W-padL-padR}" height="${H-padT-padB}" fill="transparent" id="hover-zone"/>`;
  svg.innerHTML = g;

  const tip = document.getElementById("tooltip");
  const zone = document.getElementById("hover-zone"), xhair = document.getElementById("xhair");
  zone.addEventListener("mousemove", ev => {
    const rect = svg.getBoundingClientRect();
    const sx = (ev.clientX - rect.left) / rect.width * W;
    const i = Math.max(0, Math.min(dates.length - 1,
      Math.round((sx - padL) / (W - padL - padR) * (dates.length - 1))));
    xhair.setAttribute("x1", x(i)); xhair.setAttribute("x2", x(i));
    xhair.setAttribute("visibility", "visible");
    let rows = series.map(s => {
      const v = s.pts[i]; if (v == null) return "";
      const color = s.key === "bench" ? "var(--bench)" : COLORS[s.key];
      return `<div class="row"><i style="background:${color}"></i>${s.name}<span class="val mono ${cls(v)}">${v>0?"+":""}${v.toFixed(2)}%</span></div>`;
    }).join("");
    tip.innerHTML = `<div class="tt-date mono">${dates[i]}</div>` + rows;
    tip.style.display = "block";
    const wrapRect = wrap.getBoundingClientRect();
    let tx = (x(i) / W) * wrapRect.width + 14;
    if (tx + 170 > wrapRect.width) tx -= 190;
    tip.style.left = tx + "px";
    tip.style.top = "20px";
  });
  zone.addEventListener("mouseleave", () => {
    tip.style.display = "none"; xhair.setAttribute("visibility", "hidden");
  });
}

/* ---------- 持仓明细 ---------- */
function renderPositions() {
  const t = T();
  const posBox = document.getElementById("positions"); posBox.innerHTML = "";
  DATA.strategies.forEach(s => {
    posBox.insertAdjacentHTML("beforeend",
      `<div class="strategy-label"><i style="background:${COLORS[s.key]}"></i>${sName(s)}
       <em>${t.posCount(s.positions.length, fmtUsd(s.mv))}</em></div>`);
    if (!s.positions.length) {
      posBox.insertAdjacentHTML("beforeend", `<p class="empty">${t.noPos}</p>`);
      return;
    }
    let rows = s.positions.map(p => `
      <tr>
        <td class="code">${p.code}</td>
        <td class="mono">${p.qty}</td>
        <td class="mono">${fmtUsd(p.avg)}</td>
        <td class="mono">${p.px ? fmtUsd(p.px) : "—"}</td>
        <td class="mono">${fmtUsd(p.mv)}</td>
        <td class="mono ${cls(p.upnl)}">${p.upnl>0?"+":""}${fmtUsd(p.upnl)}</td>
        <td class="mono ${cls(p.upnlPct)}">${fmtPct(p.upnlPct)}</td>
        <td class="mono">${fmtUsd(p.stop)}</td>
        <td class="mono">${p.stopDist != null ? p.stopDist.toFixed(1)+"%" : "—"}</td>
        <td class="mono">${t.days(p.days)}</td>
      </tr>`).join("");
    posBox.insertAdjacentHTML("beforeend", `
      <div class="tbl-wrap"><table>
        <thead><tr>${t.posCols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
        <tbody>${rows}</tbody></table></div>`);
  });
}

/* ---------- 最近交易 ---------- */
function renderTrades() {
  const t = T();
  const trdBox = document.getElementById("trades"); trdBox.innerHTML = "";
  DATA.strategies.forEach(s => {
    trdBox.insertAdjacentHTML("beforeend",
      `<div class="strategy-label"><i style="background:${COLORS[s.key]}"></i>${sName(s)}</div>`);
    if (!s.trades.length) {
      trdBox.insertAdjacentHTML("beforeend", `<p class="empty">${t.noTrades}</p>`);
      return;
    }
    let rows = s.trades.map(tr => `
      <tr>
        <td class="mono">${tr.date}</td>
        <td class="code">${tr.code}</td>
        <td style="text-align:left">${t.act(tr.action)}</td>
        <td class="mono">${tr.qty}</td>
        <td class="mono">${fmtUsd(tr.price)}</td>
        <td class="mono ${cls(tr.pnl)}">${tr.pnl>0?"+":""}${fmtUsd(tr.pnl)}</td>
        <td style="text-align:left;color:var(--muted)">${translateNote(tr.note)}</td>
      </tr>`).join("");
    trdBox.insertAdjacentHTML("beforeend", `
      <div class="tbl-wrap"><table>
        <thead><tr>${t.trdCols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
        <tbody>${rows}</tbody></table></div>`);
  });
}

/* ---------- 渲染全部 + 语言切换 ---------- */
function renderAll() {
  applyStatic();
  renderTiles();
  renderLegend();
  drawChart();
  renderPositions();
  renderTrades();
}
document.querySelectorAll("#langsw button").forEach(b => {
  b.addEventListener("click", () => {
    lang = b.dataset.lang;
    localStorage.setItem("dashLang", lang);
    renderAll();
  });
});
renderAll();
</script>
